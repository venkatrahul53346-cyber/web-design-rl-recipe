# Sanity ladder on the combined 15-task calibration set
# (10 Design2Code + 5 modern snapshots).
# Expected: oracle = 1.000, nop = 0.000 across all 15. Modern HTMLs are
# heavy (Linear 89MB, Cursor 64MB) — this run also tests whether the
# Modal sandbox handles the load without OOM / timeout.
job_name: calib-sanity-v3b
jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 15
  quiet: false

environment:
  type: modal
  delete: true

agents:
  - name: oracle
  - name: nop

datasets:
  - path: datasets/calibration
